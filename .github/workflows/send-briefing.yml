name: Send Daily Financial Briefing Email

on:
  push:
    branches: [main]
    paths:
      - 'briefings/zh/**.md'

jobs:
  send-email:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get new briefing file
        id: briefing
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'briefings/zh/*.md' | head -1)
          if [ -z "$FILE" ]; then
            echo "No new briefing file, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          DATE=$(basename "$FILE" .md)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Install dependencies
        if: steps.briefing.outputs.skip != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pandoc wkhtmltopdf fonts-noto-cjk -q

      - name: Convert Markdown to HTML and PDF
        if: steps.briefing.outputs.skip != 'true'
        run: |
          cat > /tmp/style-header.html << 'EOF'
          <style>
          body { font-family: "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; max-width: 860px; margin: 0 auto; padding: 24px; color: #1a1a1a; line-height: 1.7; }
          h1 { color: #1a1a1a; border-bottom: 2px solid #2563eb; padding-bottom: 8px; }
          h2 { color: #2563eb; margin-top: 28px; }
          h3 { color: #374151; }
          table { border-collapse: collapse; width: 100%; margin: 12px 0; }
          th { background: #2563eb; color: white; padding: 8px 12px; text-align: left; }
          td { padding: 7px 12px; border-bottom: 1px solid #e5e7eb; }
          tr:nth-child(even) { background: #f9fafb; }
          a { color: #2563eb; }
          hr { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
          p { margin: 6px 0; }
          </style>
          EOF

          pandoc "${{ steps.briefing.outputs.file }}" \
            -f markdown -t html -s \
            -H /tmp/style-header.html \
            --metadata title="每日金融市场资讯简报 ${{ steps.briefing.outputs.date }}" \
            -o /tmp/briefing.html

          wkhtmltopdf \
            --encoding utf-8 \
            --page-size A4 \
            --margin-top 15mm \
            --margin-bottom 15mm \
            --margin-left 15mm \
            --margin-right 15mm \
            --title "每日金融市场资讯简报 ${{ steps.briefing.outputs.date }}" \
            /tmp/briefing.html \
            "/tmp/每日金融简报-${{ steps.briefing.outputs.date }}.pdf"

      - name: Send email with PDF attachment
        if: steps.briefing.outputs.skip != 'true'
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "📊 每日金融市场资讯简报 — ${{ steps.briefing.outputs.date }}"
          to: samchen3129@gmail.com,peiwenzhou2@gmail.com
          from: "每日金融简报 <${{ secrets.MAIL_USERNAME }}>"
          html_body: file:///tmp/briefing.html
          attachments: /tmp/每日金融简报-${{ steps.briefing.outputs.date }}.pdf

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⚠️ 每日简报邮件发送失败 — ${{ steps.briefing.outputs.date }}"
          to: samchen3129@gmail.com
          from: "每日金融简报 <${{ secrets.MAIL_USERNAME }}>"
          body: |
            今日金融市场资讯简报邮件发送失败（PDF生成或SMTP错误）。

            日期：${{ steps.briefing.outputs.date }}
            工作流：send-briefing.yml

            请前往 GitHub Actions 查看详细错误日志：
            https://github.com/SoraAlaros/daily-finance-briefing/actions
